services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      PORT: ${PORT:?PORT is required}
      HOST: ${HOST:?HOST is required}
      DATABASE_HOST: ${DATABASE_HOST:?DATABASE_HOST is required}
      DATABASE_PORT: ${DATABASE_PORT:?DATABASE_PORT is required}
      DATABASE_USER: ${DATABASE_USER:?DATABASE_USER is required}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      DATABASE_NAME: ${DATABASE_NAME:?DATABASE_NAME is required}
      DATABASE_SYNCHRONIZE: ${DATABASE_SYNCHRONIZE:?DATABASE_SYNCHRONIZE is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:?JWT_ACCESS_EXPIRATION is required}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:?JWT_REFRESH_EXPIRATION is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET}
      FACEBOOK_CALLBACK_URL: ${FACEBOOK_CALLBACK_URL}
      INSTAGRAM_CLIENT_ID: ${INSTAGRAM_CLIENT_ID}
      INSTAGRAM_CLIENT_SECRET: ${INSTAGRAM_CLIENT_SECRET}
      INSTAGRAM_CALLBACK_URL: ${INSTAGRAM_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      FRONTEND_RESET_PASSWORD_URL: ${FRONTEND_RESET_PASSWORD_URL:?FRONTEND_RESET_PASSWORD_URL is required}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_TRANSPORT: ${MAIL_TRANSPORT:?MAIL_TRANSPORT is required}
      PASSWORD_RESET_MODE: ${PASSWORD_RESET_MODE:?PASSWORD_RESET_MODE is required}
      PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:?PASSWORD_RESET_TOKEN_TTL_MINUTES is required}
      PASSWORD_RESET_OTP_LENGTH: ${PASSWORD_RESET_OTP_LENGTH:?PASSWORD_RESET_OTP_LENGTH is required}
      PASSWORD_RESET_OTP_TTL_MINUTES: ${PASSWORD_RESET_OTP_TTL_MINUTES:?PASSWORD_RESET_OTP_TTL_MINUTES is required}
      PASSWORD_RESET_OTP_MAX_ATTEMPTS: ${PASSWORD_RESET_OTP_MAX_ATTEMPTS:?PASSWORD_RESET_OTP_MAX_ATTEMPTS is required}
      PASSWORD_RESET_EXPOSE_OTP: ${PASSWORD_RESET_EXPOSE_OTP:?PASSWORD_RESET_EXPOSE_OTP is required}
      RECORDINGS_STORAGE_DIR: ${RECORDINGS_STORAGE_DIR:?RECORDINGS_STORAGE_DIR is required}
      MAX_RECORDING_UPLOAD_BYTES: ${MAX_RECORDING_UPLOAD_BYTES:?MAX_RECORDING_UPLOAD_BYTES is required}
      TRANSLATION_PROVIDER: ${TRANSLATION_PROVIDER:?TRANSLATION_PROVIDER is required}
      TRANSLATION_API_URL: ${TRANSLATION_API_URL}
      TRANSLATION_API_KEY: ${TRANSLATION_API_KEY}
    ports:
      - "${BACKEND_PORT:?BACKEND_PORT is required}:${PORT:?PORT is required}"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
        VITE_RTC_ICE_SERVERS: ${VITE_RTC_ICE_SERVERS}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:?FRONTEND_PORT is required}:80"

volumes:
  postgres_data:
